<div class="registro-compra-form-page"><div class="page-header"><div><span class="breadcrumb">OBRA360 / Proyectos</span><h1>{{id?'Editar':'Nuevo'}} proyecto</h1><p>Complete los datos generales y la ubicación de la obra.</p></div></div><form [formGroup]="form" (ngSubmit)="guardar()" class="block"><div class="block-header"><h2 class="block-title">Datos del proyecto</h2></div><div class="grid"><label>Nombre *<input formControlName="nombre"></label><label>Cliente *<select formControlName="cliente_id"><option [ngValue]="null">Seleccione</option><option *ngFor="let c of clientes" [ngValue]="c.id_cliente">{{c.apellido}}, {{c.nombre}}</option></select></label><label>Fecha de creación/inicio<input type="date" formControlName="fecha_inicio"></label><label>Fecha estimada de entrega<input type="date" formControlName="fecha_fin_estimada"></label><label>Estado<select formControlName="estado"><option>ACTIVO</option><option>PAUSADO</option><option>FINALIZADO</option><option>CANCELADO</option></select></label></div><div class="block-header location-title"><h2 class="block-title">Ubicación</h2></div><div class="grid location-grid"><label>País<input formControlName="pais"></label><label>Provincia<input formControlName="provincia"></label><label>Localidad<input formControlName="localidad"></label><label>Calle y número<input formControlName="calle"></label></div><p class="error" *ngIf="error">{{error}}</p><div class="actions"><button type="button" class="btn btn-ghost" (click)="cancelar()">Cancelar</button><button class="btn btn-primary" [disabled]="guardando">{{guardando?'Guardando...':'Guardar proyecto'}}</button></div></form></div>
