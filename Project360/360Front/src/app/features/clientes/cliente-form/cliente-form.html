<div class="registro-compra-form-page cliente-form-page"><div class="page-header"><div><span class="breadcrumb">OBRA360 / Comercial / Clientes</span><h1>{{ esEdicion ? 'Editar cliente' : 'Nuevo cliente' }}</h1><p>{{ esEdicion ? 'Modifique los datos generales del cliente.' : 'Complete los datos del nuevo cliente.' }}</p></div></div><div *ngIf="error" class="error-message">{{ error }}</div><div *ngIf="cargando" class="state-message">Cargando cliente...</div>
  <form *ngIf="!cargando" [formGroup]="clienteForm" (ngSubmit)="guardar()" class="block"><div class="block-header"><h2 class="block-title">Datos del cliente</h2></div><div class="block-body"><div class="form-grid"><label class="form-group">Nombre *<input formControlName="nombre" placeholder="Ingrese el nombre"><small *ngIf="campoInvalido('nombre')">El nombre es obligatorio y admite hasta 50 caracteres.</small></label><label class="form-group">Apellido *<input formControlName="apellido" placeholder="Ingrese el apellido"><small *ngIf="campoInvalido('apellido')">El apellido es obligatorio y admite hasta 50 caracteres.</small></label><label class="form-group full-width">CUIL<input formControlName="cuil" placeholder="20-12345678-9" maxlength="13" (input)="formatearCuil($event)"></label></div><div class="form-actions"><button type="button" class="btn btn-ghost" (click)="cancelar()"><mat-icon>close</mat-icon>Cancelar</button><button class="btn btn-primary" [disabled]="guardando"><mat-icon>save</mat-icon>{{guardando?'Guardando...':'Guardar cliente'}}</button></div></div></form>
</div>
