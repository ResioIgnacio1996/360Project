<div class="form-page">
  <div class="page-header">
    <div>
      <span class="breadcrumb">DB360 / Seguridad / Usuarios</span>
      <h1>{{ esEdicion ? 'Editar usuario' : 'Nuevo usuario' }}</h1>
      <p>
        {{ esEdicion ? 'Modificá los datos principales del usuario.' : 'Creá un usuario habilitado para operar en DB360.' }}
      </p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="guardar()">
    <section class="block">
      <div class="block-header">
        <h2 class="block-title">Datos principales</h2>
        <span class="chip chip-no-dot chip-blue">{{ esEdicion ? 'EDICIÓN' : 'ALTA' }}</span>
      </div>

      <div class="block-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Usuario *</label>
            <input type="text" formControlName="usuario">
          </div>

          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" formControlName="nombre">
          </div>

          <div class="form-group">
            <label>Email *</label>
            <input type="email" formControlName="email">
          </div>

          <div class="form-group">
            <label>Rol *</label>
            <select formControlName="rol_id">
              <option value="">Seleccione un rol</option>

              @for (rol of roles; track rol.rol_id) {
                <option [value]="rol.rol_id">
                  {{ rol.nombre }}
                </option>
              }
            </select>
          </div>

          @if (!esEdicion) {
            <div class="form-group">
              <label>Password *</label>
              <input type="password" formControlName="password">
            </div>

            <div class="form-group">
              <label>Confirmar password *</label>
              <input type="password" formControlName="confirmarPassword">
            </div>
          }
        </div>
      </div>
    </section>

    <div class="form-actions">
      <button type="button" class="btn btn-ghost" routerLink="/seguridad/usuarios">
        Cancelar
      </button>

      <button type="submit" class="btn btn-primary">
        Guardar
      </button>
    </div>
  </form>
</div>
