<div class="seguridad-page">
  <div class="page-header">
    <div>
      <span class="breadcrumb">DB360 / Seguridad</span>
      <h1>Seguridad</h1>
      <p>Administrá usuarios, roles, entidades y acciones del sistema.</p>
    </div>
  </div>

  <section class="block">
    <div class="block-header">
      <h2 class="block-title">Panel operativo</h2>
      <span class="chip chip-no-dot chip-blue">ACCESOS</span>
    </div>

    <div class="security-grid">
      <button class="security-tile" type="button" routerLink="/seguridad/usuarios">
        <span class="material-icons">person</span>
        <strong>Usuarios</strong>
        <small>Alta, edición, activación y permisos.</small>
      </button>

      <button class="security-tile" type="button" routerLink="/seguridad/roles">
        <span class="material-icons">shield</span>
        <strong>Roles</strong>
        <small>Perfiles y permisos por rol.</small>
      </button>

      <button class="security-tile" type="button" routerLink="/seguridad/entidades">
        <span class="material-icons">category</span>
        <strong>Entidades</strong>
        <small>Objetos sobre los que se asignan acciones.</small>
      </button>

      <button class="security-tile" type="button" routerLink="/seguridad/acciones">
        <span class="material-icons">settings_suggest</span>
        <strong>Acciones</strong>
        <small>Catálogo técnico de permisos.</small>
      </button>
    </div>
  </section>
</div>
