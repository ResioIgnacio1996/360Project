<div class="login-page">

  <div class="login-card">

    <h1>DB360</h1>

    <h3>Seguridad y Usuarios</h3>

    <form (ngSubmit)="iniciarSesion()">

      <div class="form-group">
        <label>Usuario</label>
        <input
          type="text"
          name="usuario"
          [(ngModel)]="usuario">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password">
      </div>

      <button type="submit">
        Ingresar
      </button>

      @if(error){

        <div class="error">
          {{ error }}
        </div>

      }

    </form>

  </div>

</div>
